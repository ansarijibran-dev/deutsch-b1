name: Build iOS IPA

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-ios:
    runs-on: macos-15

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Patch codegen — nil-safe thirdPartyFabricComponents (iOS 26 fix)
        run: |
          python3 - << 'PYEOF'
          import re

          # 1. Patch the JS generator to output nil-safe add() calls instead of dict literals
          js_path = 'node_modules/react-native/scripts/codegen/generate-artifacts-executor/generateRCTThirdPartyComponents.js'
          with open(js_path) as f:
              src = f.read()

          old = r'return `\t\t@"${componentName}": NSClassFromString(@"${className}"), // ${library}`;'
          new = r'return `\t\t{ Class _c = NSClassFromString(@"${className}"); if (_c) map[@"${componentName}"] = _c; } // ${library}`;'
          patched = src.replace(old, new)
          assert patched != src, "JS patch not applied — source changed?"
          with open(js_path, 'w') as f:
              f.write(patched)
          print("Patched generateRCTThirdPartyComponents.js")

          # 2. Patch the .mm template to use NSMutableDictionary instead of @{} literal
          tmpl_path = 'node_modules/react-native/scripts/codegen/templates/RCTThirdPartyComponentsProviderMM.template'
          with open(tmpl_path) as f:
              src = f.read()

          old_block = (
              '  dispatch_once(&nativeComponentsToken, ^{\n'
              '    thirdPartyComponents = @{\n'
              '{thirdPartyComponentsMapping}\n'
              '    };\n'
              '  });'
          )
          new_block = (
              '  dispatch_once(&nativeComponentsToken, ^{\n'
              '    NSMutableDictionary<NSString *, Class<RCTComponentViewProtocol>> *map =\n'
              '        [NSMutableDictionary new];\n'
              '{thirdPartyComponentsMapping}\n'
              '    thirdPartyComponents = map;\n'
              '  });'
          )
          patched = src.replace(old_block, new_block)
          assert patched != src, "Template patch not applied — source changed?"
          with open(tmpl_path, 'w') as f:
              f.write(patched)
          print("Patched RCTThirdPartyComponentsProviderMM.template")
          PYEOF

      - name: Expo prebuild (generate Xcode project)
        run: npx expo prebuild --platform ios --clean

      - name: Remove react-native-screens split-view and orientation sources (codegen-dependent, not needed)
        run: |
          rm -rf node_modules/react-native-screens/ios/gamma/split-view
          rm -rf node_modules/react-native-screens/ios/gamma/orientation

      - name: Patch expo-router Toolbar files for iOS 26 API compatibility (Xcode 16 / iOS 18 SDK)
        run: |
          python3 - << 'PYEOF'
          import re

          # RouterToolbarHostView.swift — remove if #available(iOS 26.0, *) block that sets
          # hidesSharedBackground / sharesBackground (iOS 26 SDK symbols)
          path = 'node_modules/expo-router/ios/Toolbar/RouterToolbarHostView.swift'
          with open(path) as f:
              src = f.read()
          src = re.sub(
              r'\s*if #available\(iOS 26\.0, \*\) \{\s*if let hidesSharedBackground.*?sharesBackground = sharesBackground\s*\}\s*\}',
              '',
              src,
              flags=re.DOTALL
          )
          with open(path, 'w') as f:
              f.write(src)
          print("Patched RouterToolbarHostView.swift")

          # RouterToolbarItemView.swift — three iOS 26 blocks
          path = 'node_modules/expo-router/ios/Toolbar/RouterToolbarItemView.swift'
          with open(path) as f:
              src = f.read()
          # 1. searchBar guard calls searchBarPlacementBarButtonItem — replace that line only
          src = src.replace(
              'item = controller.navigationItem.searchBarPlacementBarButtonItem',
              'currentBarButtonItem = nil\n        return'
          )
          # 2. applyCommonProperties hidesSharedBackground / sharesBackground block
          src = re.sub(
              r'\s*if #available\(iOS 26\.0, \*\) \{\s*item\.hidesSharedBackground.*?item\.sharesBackground.*?\}',
              '',
              src,
              flags=re.DOTALL
          )
          # 3. badge block
          src = re.sub(
              r'\s*if #available\(iOS 26\.0, \*\) \{\s*if let badgeConfig.*?item\.badge = nil\s*\}\s*\}',
              '',
              src,
              flags=re.DOTALL
          )
          with open(path, 'w') as f:
              f.write(src)
          print("Patched RouterToolbarItemView.swift")

          # RouterToolbarModule.swift — .prominent case returns iOS 26-only .prominent style
          path = 'node_modules/expo-router/ios/Toolbar/RouterToolbarModule.swift'
          with open(path) as f:
              src = f.read()
          src = re.sub(
              r'if #available\(iOS 26\.0, \*\) \{\s*return \.prominent\s*\} else \{\s*return \.done\s*\}',
              'return .done',
              src,
              flags=re.DOTALL
          )
          with open(path, 'w') as f:
              f.write(src)
          print("Patched RouterToolbarModule.swift")

          # expo-image ImageView.swift — applySymbolEffectiOS26 uses iOS 26-only .drawOn/.drawOff
          # symbols. The @available attribute marks it available, but Swift still typechecks the body.
          path = 'node_modules/expo-image/ios/ImageView.swift'
          with open(path) as f:
              src = f.read()
          src = re.sub(
              r'(@available\(iOS 26\.0, tvOS 26\.0, \*\)\s*private func applySymbolEffectiOS26\([^)]*\)[^{]*\{).*?(\n  \})',
              r'\1\n  }',
              src,
              flags=re.DOTALL
          )
          with open(path, 'w') as f:
              f.write(src)
          print("Patched expo-image ImageView.swift")
          PYEOF

      - name: Patch expo-modules-core for @MainActor conformance compatibility
        run: |
          # Remove @MainActor from protocol conformance positions (unsupported in this Swift mode)
          sed -i '' 's/ExpoView, @MainActor AnyExpoSwiftUIHostingView/ExpoView, AnyExpoSwiftUIHostingView/' \
            node_modules/expo-modules-core/ios/Core/Views/SwiftUI/SwiftUIHostingView.swift
          sed -i '' 's/extension ExpoSwiftUI.SwiftUIVirtualView: @MainActor ExpoSwiftUI.ViewWrapper/extension ExpoSwiftUI.SwiftUIVirtualView: ExpoSwiftUI.ViewWrapper/' \
            node_modules/expo-modules-core/ios/Core/Views/SwiftUI/SwiftUIVirtualView.swift
          sed -i '' 's/extension UIView: @MainActor AnyArgument/extension UIView: AnyArgument/' \
            node_modules/expo-modules-core/ios/Core/Views/ViewDefinition.swift
          echo "Patched expo-modules-core @MainActor conformances"

      - name: Patch Podfile for Swift 6 compatibility
        run: |
          echo "--- post_install lines in Podfile ---"
          grep -n "post_install" ios/Podfile || echo "(none found)"
          python3 - << 'PYEOF'
          import re, sys

          with open('ios/Podfile', 'r') as f:
              content = f.read()

          patch = """
            # Swift 6 fix + deployment target fix for all pod targets
            installer.pods_project.targets.each do |target|
              target.build_configurations.each do |config|
                config.build_settings['SWIFT_STRICT_CONCURRENCY'] = 'minimal'
                config.build_settings['SWIFT_VERSION'] = '5.9'
                config.build_settings['IPHONEOS_DEPLOYMENT_TARGET'] = '17.0'
              end
            end
            # RNScreens fix: ensure it builds after ReactCodegen
            installer.pods_project.targets.each do |target|
              next unless target.name == 'RNScreens'
              codegen = installer.pods_project.targets.find { |t| t.name == 'ReactCodegen' }
              next unless codegen
              dep = installer.pods_project.new(Xcodeproj::Project::Object::PBXTargetDependency)
              dep.target = codegen
              target.dependencies << dep
            end
          """

          # Inject after the opening line of an existing post_install block
          new_content, count = re.subn(
              r'(post_install\s+do\s+\|\w+\|)',
              r'\1\n' + patch,
              content,
              count=1
          )

          if count == 0:
              # No post_install block found — append one
              new_content = content + '\npost_install do |installer|\n' + patch + '\nend\n'
              print("No post_install block found; appended new one.")
          else:
              print(f"Patched existing post_install block.")

          with open('ios/Podfile', 'w') as f:
              f.write(new_content)

          print("Done. Verifying patch:")
          PYEOF
          grep -c "SWIFT_STRICT_CONCURRENCY" ios/Podfile && echo "Patch confirmed in Podfile" || echo "PATCH MISSING"

      - name: Install CocoaPods
        run: cd ios && pod install

      - name: Archive with xcodebuild
        run: |
          xcodebuild archive \
            -workspace ios/Velocitrainer.xcworkspace \
            -scheme "Velocitrainer" \
            -configuration Release \
            -archivePath $RUNNER_TEMP/Velocitrainer.xcarchive \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            SWIFT_STRICT_CONCURRENCY=minimal \
            IPHONEOS_DEPLOYMENT_TARGET=17.0

      - name: Export IPA (manual packaging — bypasses team requirement)
        run: |
          mkdir -p "$RUNNER_TEMP/Payload"
          cp -R "$RUNNER_TEMP/Velocitrainer.xcarchive/Products/Applications/Velocitrainer.app" "$RUNNER_TEMP/Payload/"
          cd "$RUNNER_TEMP"
          zip -r "Velocitrainer.ipa" Payload
          mkdir -p "$RUNNER_TEMP/ipa-output"
          cp "$RUNNER_TEMP/Velocitrainer.ipa" "$RUNNER_TEMP/ipa-output/"

      - name: Upload IPA as artifact
        uses: actions/upload-artifact@v4
        with:
          name: velocitrainer-ios-ipa
          path: ${{ runner.temp }}/ipa-output/*.ipa
          retention-days: 30
