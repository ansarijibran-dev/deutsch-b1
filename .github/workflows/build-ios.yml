name: Build iOS IPA

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-ios:
    runs-on: macos-15

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Expo prebuild (generate Xcode project)
        run: npx expo prebuild --platform ios --clean

      - name: Remove react-native-screens Gamma sources (iPad split-view, not needed)
        run: rm -rf node_modules/react-native-screens/ios/gamma

      - name: Install CocoaPods
        run: cd ios && pod install

      - name: Generate React Native codegen artifacts
        run: |
          xcodebuild build \
            -workspace ios/deutschb1.xcworkspace \
            -scheme ReactCodegen \
            -destination "generic/platform=iOS" \
            -configuration Release \
            -derivedDataPath $RUNNER_TEMP/DerivedData \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            SWIFT_STRICT_CONCURRENCY=minimal

      - name: Archive with xcodebuild
        run: |
          xcodebuild archive \
            -workspace ios/deutschb1.xcworkspace \
            -scheme "DeutschB1" \
            -configuration Release \
            -archivePath $RUNNER_TEMP/deutschb1.xcarchive \
            -derivedDataPath $RUNNER_TEMP/DerivedData \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            SWIFT_STRICT_CONCURRENCY=minimal

      - name: Export IPA
        run: |
          xcodebuild -exportArchive \
            -archivePath $RUNNER_TEMP/deutschb1.xcarchive \
            -exportOptionsPlist $GITHUB_WORKSPACE/ExportOptions.plist \
            -exportPath $RUNNER_TEMP/build \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO

      - name: Package IPA artifact
        run: |
          mkdir -p $RUNNER_TEMP/ipa-output
          cp $RUNNER_TEMP/build/*.ipa $RUNNER_TEMP/ipa-output/

      - name: Upload IPA as artifact
        uses: actions/upload-artifact@v4
        with:
          name: deutschb1-ios-ipa
          path: ${{ runner.temp }}/ipa-output/*.ipa
          retention-days: 30
