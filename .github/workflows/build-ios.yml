name: Build iOS IPA

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-ios:
    runs-on: macos-15

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Expo prebuild (generate Xcode project)
        run: npx expo prebuild --platform ios --clean

      - name: Remove react-native-screens split-view and orientation sources (codegen-dependent, not needed)
        run: |
          rm -rf node_modules/react-native-screens/ios/gamma/split-view
          rm -rf node_modules/react-native-screens/ios/gamma/orientation

      - name: Patch expo-modules-core for @MainActor conformance compatibility
        run: |
          # Remove @MainActor from protocol conformance positions (unsupported in this Swift mode)
          sed -i '' 's/ExpoView, @MainActor AnyExpoSwiftUIHostingView/ExpoView, AnyExpoSwiftUIHostingView/' \
            node_modules/expo-modules-core/ios/Core/Views/SwiftUI/SwiftUIHostingView.swift
          sed -i '' 's/extension ExpoSwiftUI.SwiftUIVirtualView: @MainActor ExpoSwiftUI.ViewWrapper/extension ExpoSwiftUI.SwiftUIVirtualView: ExpoSwiftUI.ViewWrapper/' \
            node_modules/expo-modules-core/ios/Core/Views/SwiftUI/SwiftUIVirtualView.swift
          sed -i '' 's/extension UIView: @MainActor AnyArgument/extension UIView: AnyArgument/' \
            node_modules/expo-modules-core/ios/Core/Views/ViewDefinition.swift
          echo "Patched expo-modules-core @MainActor conformances"

      - name: Patch Podfile for Swift 6 compatibility
        run: |
          echo "--- post_install lines in Podfile ---"
          grep -n "post_install" ios/Podfile || echo "(none found)"
          python3 - << 'PYEOF'
          import re, sys

          with open('ios/Podfile', 'r') as f:
              content = f.read()

          patch = """
            # Swift 6 fix: disable strict concurrency on all pod targets
            installer.pods_project.targets.each do |target|
              target.build_configurations.each do |config|
                config.build_settings['SWIFT_STRICT_CONCURRENCY'] = 'minimal'
                config.build_settings['SWIFT_VERSION'] = '5.9'
              end
            end
            # RNScreens fix: ensure it builds after ReactCodegen
            installer.pods_project.targets.each do |target|
              next unless target.name == 'RNScreens'
              codegen = installer.pods_project.targets.find { |t| t.name == 'ReactCodegen' }
              next unless codegen
              dep = installer.pods_project.new(Xcodeproj::Project::Object::PBXTargetDependency)
              dep.target = codegen
              target.dependencies << dep
            end
          """

          # Inject after the opening line of an existing post_install block
          new_content, count = re.subn(
              r'(post_install\s+do\s+\|\w+\|)',
              r'\1\n' + patch,
              content,
              count=1
          )

          if count == 0:
              # No post_install block found — append one
              new_content = content + '\npost_install do |installer|\n' + patch + '\nend\n'
              print("No post_install block found; appended new one.")
          else:
              print(f"Patched existing post_install block.")

          with open('ios/Podfile', 'w') as f:
              f.write(new_content)

          print("Done. Verifying patch:")
          PYEOF
          grep -c "SWIFT_STRICT_CONCURRENCY" ios/Podfile && echo "Patch confirmed in Podfile" || echo "PATCH MISSING"

      - name: Install CocoaPods
        run: cd ios && pod install

      - name: Archive with xcodebuild
        run: |
          xcodebuild archive \
            -workspace ios/deutschb1.xcworkspace \
            -scheme "DeutschB1" \
            -configuration Release \
            -archivePath $RUNNER_TEMP/deutschb1.xcarchive \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            SWIFT_STRICT_CONCURRENCY=minimal \
            IPHONEOS_DEPLOYMENT_TARGET=17.0

      - name: Export IPA
        run: |
          xcodebuild -exportArchive \
            -archivePath $RUNNER_TEMP/deutschb1.xcarchive \
            -exportOptionsPlist $GITHUB_WORKSPACE/ExportOptions.plist \
            -exportPath $RUNNER_TEMP/build \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO

      - name: Package IPA artifact
        run: |
          mkdir -p $RUNNER_TEMP/ipa-output
          cp $RUNNER_TEMP/build/*.ipa $RUNNER_TEMP/ipa-output/

      - name: Upload IPA as artifact
        uses: actions/upload-artifact@v4
        with:
          name: deutschb1-ios-ipa
          path: ${{ runner.temp }}/ipa-output/*.ipa
          retention-days: 30
